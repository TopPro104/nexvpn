# Android release workflow.
#
# Manual trigger only until the prebuilt JNI libraries (.so) are sourced in CI.
# Locally these live in src-tauri/gen/android/app/src/main/jniLibs/<abi>/ and
# come from gomobile bind builds of upstream Go projects:
#   libsingbox.so   ← SagerNet/sing-box-for-android
#   libxray.so      ← 2dust/AndroidLibXrayLite
#   libtun2socks.so ← xjasonlyu/tun2socks (gomobile)
#   libnativehelper.so ← built from src/main/jni/native_helper.c by Gradle
#
# To enable automatic builds:
#   1. Either commit the .so libs to the repo (add Git LFS — they total ~88MB),
#      OR upload them once as a GitHub release named 'android-prebuilts' and
#      add a download step here.
#   2. Add repository secrets: ANDROID_KEYSTORE_BASE64 (base64 of release
#      keystore), ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD.
#   3. Switch trigger to also fire on tag push (uncomment the push.tags block).

name: Build Android (signed APK)

on:
  workflow_dispatch:
  # push:
  #   tags:
  #     - "v*"

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973" "build-tools;34.0.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Verify JNI libs present
        run: |
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            for lib in libsingbox.so libxray.so libtun2socks.so; do
              if [ ! -f "src-tauri/gen/android/app/src/main/jniLibs/$abi/$lib" ]; then
                echo "Missing: jniLibs/$abi/$lib — see workflow comments"
                exit 1
              fi
            done
          done

      - name: Build APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: npx tauri android build --apk

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > nexvpn-release.keystore

      - name: Sign APK
        env:
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          APK_DIR=src-tauri/gen/android/app/build/outputs/apk/universal/release
          UNSIGNED="$APK_DIR/app-universal-release-unsigned.apk"
          ALIGNED="$APK_DIR/app-universal-release-aligned.apk"
          SIGNED="$APK_DIR/NexVPN-signed.apk"
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign" -v 4 "$UNSIGNED" "$ALIGNED"
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks nexvpn-release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out "$SIGNED" \
            "$ALIGNED"
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify --verbose "$SIGNED"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/NexVPN-signed.apk
          fail_on_unmatched_files: false

      - name: Upload artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: nexvpn-android
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/NexVPN-signed.apk
