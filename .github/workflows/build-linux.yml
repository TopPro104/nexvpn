name: Build Linux (AppImage + Flatpak)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Download Linux cores
        run: |
          chmod +x download-cores.sh
          bash download-cores.sh x86_64-unknown-linux-gnu

      - name: Build Tauri AppImage + deb
        run: npx tauri build

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: nexvpn-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: nexvpn-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  build-flatpak:
    runs-on: ubuntu-22.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/com.horusvpn.nexvpn.yml
          bundle: nexvpn.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: nexvpn-linux-flatpak
          path: nexvpn.flatpak
