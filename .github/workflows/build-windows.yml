name: Build Windows (NSIS + portable)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Download cores
        shell: bash
        run: bash download-cores.sh x86_64-pc-windows-msvc

      - name: Fetch wintun.dll
        shell: bash
        run: |
          curl -fsSL -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
          unzip -q wintun.zip
          cp wintun/bin/amd64/wintun.dll src-tauri/binaries/wintun.dll
          rm -rf wintun wintun.zip

      - name: Build Tauri (NSIS)
        run: npm run tauri build

      - name: Pack portable
        shell: pwsh
        run: ./pack-portable.ps1

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            dist-portable/*.zip
          fail_on_unmatched_files: false

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: nexvpn-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            dist-portable/*.zip
